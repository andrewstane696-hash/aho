<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Him ❤️</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

.container{
    text-align:center;
    position:relative;
}

img{
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:50%;
    border:4px solid pink;
    box-shadow:0 0 30px red;
    animation:float 3s infinite ease-in-out;
}

h1{
    color:white;
    margin-top:20px;
    animation:pulse 1s infinite;
}

.heart{
    position:absolute;
    color:red;
    animation:rise 4s linear infinite;
}

@keyframes float{
    50%{
        transform:translateY(-10px);
    }
}

@keyframes pulse{
    50%{
        transform:scale(1.1);
        color:pink;
    }
}

@keyframes rise{
    from{
        transform:translateY(100vh);
        opacity:1;
    }

    to{
        transform:translateY(-100vh);
        opacity:0;
    }
}


</style>
</head>

<body>

<div class="container">

<img src="image.jpg">

<h1> I lovee youuu
    Ahoo ❤️</h1>

</div>

<script>

function createHeart(){

    const heart=document.createElement("div");

    heart.innerHTML="❤️";

    heart.classList.add("heart");

    heart.style.left=Math.random()*window.innerWidth+"px";

    heart.style.fontSize=
    Math.random()*30+20+"px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },4000);

}


setInterval(createHeart,250);
</script>

<audio autoplay loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>>

<script>

</script>
</body>

</html>
